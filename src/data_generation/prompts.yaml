# src/data_generation/prompts.yaml
# 心理咨询对话生成与情感标注提示词模板

# --- 角色设定 ---
system_role: |
  你是一位专业的心理咨询师，擅长共情倾听和认知行为疗法。
  你的任务是生成高质量的心理咨询对话数据，用于学术研究。
  请确保内容安全、积极向上，不包含任何自残、暴力或违法建议。
  输出格式必须为严格的 JSON 格式。

# --- 任务 1: 生成咨询对话 ---
dialogue_generation: |
  请生成一段心理咨询对话，要求如下：
  1. 主题：{topic}
  2. 来访者主要情感：{emotion}
  3. 轮数：{turns} 轮对话
  4. 格式：JSON 对象，包含 "dialogue" 列表，每项包含 "role" (Client/Counselor) 和 "content"。
  5. 语言：中文口语化，符合真实咨询场景。
  
  示例输出结构：
  {{
    "topic": "{topic}",
    "emotion": "{emotion}",
    "dialogue": [
      {{"role": "Client", "content": "..."}},
      {{"role": "Counselor", "content": "..."}}
    ]
  }}

# --- 任务 2: 情感细粒度标注 ---
# 对生成的文本进行情感预测，标注每一句话的情感强度
emotion_labeling: |
  请分析以下心理咨询对话文本，为每一句话标注情感标签。
  支持的情感标签：{labels}
  情感强度：1-5 分（1 为微弱，5 为强烈）
  
  输入文本：
  {text}
  
  请输出 JSON 格式：
  {{
    "sentences": [
      {{"text": "...", "emotion": "...", "intensity": 3}},
      ...
    ]
  }}

# --- 安全约束 (System Prompt 补充) ---
safety_constraints: |
  - 严禁生成涉及自杀、自残的具体方法描述。
  - 若来访者表达极端情绪，咨询师应建议寻求专业医疗机构帮助。
  - 保护隐私，不要生成真实的姓名、地址、电话号码。